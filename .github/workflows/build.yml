name: Build AutoTyper EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pynput pyperclip pywin32 beautifulsoup4 requests

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller --onefile --windowed --name "AutoTyper" autotyper.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoTyper-Windows
          path: dist/AutoTyper.exe
          retention-days: 30

      # Only upload to GitHub Release when a release is published
      - name: Upload EXE to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AutoTyper.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
