name: Build AutoTyper EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # Don't cancel all if one platform fails
      matrix:
        include:
          - os: windows-latest
            artifact-name: AutoTyper-Windows
            exe-path: dist/AutoTyper.exe
            exe-name: AutoTyper.exe

          - os: macos-latest
            artifact-name: AutoTyper-macOS
            exe-path: dist/AutoTyper
            exe-name: AutoTyper-macOS

          - os: ubuntu-latest
            artifact-name: AutoTyper-Linux
            exe-path: dist/AutoTyper
            exe-name: AutoTyper-Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Tkinter on Linux (not bundled by default)
      - name: Install Tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install common dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pynput pyperclip beautifulsoup4 requests

      # pywin32 is Windows-only
      - name: Install Windows-only dependencies
        if: runner.os == 'Windows'
        run: pip install pywin32

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller --onefile --windowed --name "AutoTyper" autotyper.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.exe-path }}
          retention-days: 30

      # Upload to GitHub Release when a release is published
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.exe-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
