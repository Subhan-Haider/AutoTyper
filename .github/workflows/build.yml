name: Build & Release AutoTyper

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ─── Job 1: Build on all platforms ────────────────────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: AutoTyper-Windows
            exe-path: dist/AutoTyper.exe

          - os: macos-latest
            artifact-name: AutoTyper-macOS
            exe-path: dist/AutoTyper

          - os: ubuntu-latest
            artifact-name: AutoTyper-Linux
            exe-path: dist/AutoTyper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install common dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pynput pyperclip beautifulsoup4 requests

      - name: Install Windows-only dependencies
        if: runner.os == 'Windows'
        run: pip install pywin32

      - name: Build with PyInstaller
        run: python -m PyInstaller --onefile --windowed --name "AutoTyper" autotyper.py

      # Rename binaries so they don't overwrite each other in the release
      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/AutoTyper.exe dist/AutoTyper-Windows.exe

      - name: Rename binary (macOS)
        if: runner.os == 'macOS'
        run: mv dist/AutoTyper dist/AutoTyper-macOS

      - name: Rename binary (Linux)
        if: runner.os == 'Linux'
        run: mv dist/AutoTyper dist/AutoTyper-Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/
          retention-days: 7

  # ─── Job 2: Create GitHub Release with all 3 builds ───────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build   # Wait for ALL builds to finish first
    permissions:
      contents: write

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: AutoTyper-Windows
          path: release/

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: AutoTyper-macOS
          path: release/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: AutoTyper-Linux
          path: release/

      - name: Get short commit SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create or update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AutoTyper Pro — Latest Build"
          body: |
            ## ⌨️ AutoTyper Pro — Automatic Build

            **Commit:** `${{ steps.sha.outputs.short }}` on `${{ github.ref_name }}`
            **Built:** ${{ github.event.head_commit.message }}

            ### ⬇️ Downloads
            | Platform | File |
            |---|---|
            | 🪟 Windows | `AutoTyper-Windows.exe` |
            | 🍎 macOS   | `AutoTyper-macOS` |
            | 🐧 Linux   | `AutoTyper-Linux` |

            > ⚠️ **Rich text clipboard** (Bold/Italic/Headings auto-detection) works on **Windows only**.
            > macOS and Linux support basic text typing mode.

            ---
            *Auto-generated by GitHub Actions on every push to `${{ github.ref_name }}`*
          prerelease: false
          make_latest: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
